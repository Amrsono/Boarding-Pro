<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | GoldenBoarding</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
            animation: fade-in 0.8s ease-out;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card glass-panel">
        <div class="login-logo"><span class="gold-text">Golden</span>Admin</div>
        <p class="subtitle" style="margin-bottom: 2rem;">Secure Access Portal</p>

        <div id="error-box" class="error-msg">Invalid username or password</div>

        <form id="login-form">
            <div class="form-group">
                <label
                    style="display:block; margin-bottom:0.5rem; font-size:0.9rem; color:var(--text-muted);">Username</label>
                <input type="text" id="username" required placeholder="admin">
            </div>
            <div class="form-group">
                <label
                    style="display:block; margin-bottom:0.5rem; font-size:0.9rem; color:var(--text-muted);">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="cta-button pulse-glow" style="width:100%; margin-top:1rem;">Login to
                Dashboard</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            try {
                // Use relative path to API
                const resp = await fetch('api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });

                if (resp.ok) {
                    const data = await resp.json();
                    localStorage.setItem('admin_token', data.token);
                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorBox.textContent = 'Invalid username or password';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = 'Server Unreachable. Please use http://localhost:3000';
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>

</html>
