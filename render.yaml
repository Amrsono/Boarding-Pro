services:
  - type: web
    name: boarding-pro
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set this in the Render Dashboard
      - key: DB_NAME
        value: golden_boarding
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false # Set this in the Render Dashboard
      - key: NEWS_API_KEY
        sync: false # Set this in the Render Dashboard
